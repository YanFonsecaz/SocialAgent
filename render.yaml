services:
  - type: web
    name: socialagent
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3333"

      # `.env` files are ignored by Git and excluded from Docker builds.
      # Configure these directly in Render before deploying.
      # Database (set this in Render to your Render Postgres Internal URL)
      - key: DATABASE_URL
        sync: false

      # Required by the app
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false

      # Optional
      - key: CORS_ORIGIN
        sync: false

      # Optional email settings
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_SUBJECT
        sync: false
      - key: EMAIL_PROVIDER_API_KEY
        sync: false
      - key: EMAIL_API_PROVIDER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: POSTMARK_SERVER_TOKEN
        sync: false
  - type: cron
    name: socialagent-retention-cleanup
    env: docker
    schedule: "0 3 * * *"
    dockerfilePath: ./Dockerfile
    dockerContext: .
    startCommand: "bun run cleanup:retention"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
